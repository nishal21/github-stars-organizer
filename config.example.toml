[github]
username = "your-github-username"
token = "ghp_xxxx"           # Personal access token (classic)

[github.session]
# DevTools → Network → any github.com request → Headers → Cookie (full string)
cookies = "_octo=...; user_session=...; logged_in=yes; ..."

concurrency = 5

# Optional: enable LLM categorization with organize-stars plan --llm
